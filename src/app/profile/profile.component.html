<div class="section">
  <div class="container" style="max-width: 800px;">
    <div class="panel fade-in">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px;">
        <h1 class="section-title" style="text-align: left; margin: 0;">Perfil de Usuario</h1>
        @if (!isEditing()) {
          <button class="btn btn-outline" (click)="startEdit()">
            <i class="fas fa-edit"></i> Editar Perfil
          </button>
        }
      </div>

      @if (!isEditing()) {
        <div class="profile-display">
          <div style="display: flex; gap: 32px; align-items: center; margin-bottom: 32px;">
            <div style="width: 120px; height: 120px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #94a3b8;">
              <i class="fas fa-user-circle"></i>
            </div>
            <div>
              <h2 style="margin: 0; font-size: 28px;">{{ profile().name }}</h2>
              <p style="color: var(--blue2); font-weight: 600; font-size: 18px; margin: 4px 0;">Dueño de {{ profile().petName }} ({{ profile().breed }})</p>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;">
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 4px;">Ubicación</label>
              <p style="margin: 0; font-size: 16px;"><i class="fas fa-map-marker-alt" style="margin-right: 8px; color: var(--blue2);"></i> {{ profile().location }}</p>
            </div>
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 4px;">Email</label>
              <p style="margin: 0; font-size: 16px;"><i class="fas fa-envelope" style="margin-right: 8px; color: var(--blue2);"></i> {{ profile().email }}</p>
            </div>
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 4px;">Teléfono</label>
              <p style="margin: 0; font-size: 16px;"><i class="fas fa-phone" style="margin-right: 8px; color: var(--blue2);"></i> {{ profile().phone }}</p>
            </div>
          </div>

          <div>
            <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 8px;">Biografía</label>
            <p style="margin: 0; font-size: 16px; line-height: 1.6; color: #334155;">{{ profile().bio }}</p>
          </div>
        </div>
      } @else {
        <div class="profile-edit form-grid fade-in">
          <div class="field">
            <label class="label">Tu Nombre</label>
            <input type="text" [(ngModel)]="editForm.name" class="input">
          </div>
          <div class="field">
            <label class="label">Nombre de tu Mascota</label>
            <input type="text" [(ngModel)]="editForm.petName" class="input">
          </div>
          <div class="field">
            <label class="label">Raza</label>
            <input type="text" [(ngModel)]="editForm.breed" class="input">
          </div>
          <div class="field">
            <label class="label">Ubicación</label>
            <input type="text" [(ngModel)]="editForm.location" class="input">
          </div>
          <div class="field">
            <label class="label">Correo Electrónico</label>
            <input type="email" [(ngModel)]="editForm.email" class="input">
          </div>
          <div class="field">
            <label class="label">Teléfono</label>
            <input type="text" [(ngModel)]="editForm.phone" class="input">
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label class="label">Biografía</label>
            <textarea [(ngModel)]="editForm.bio" class="input textarea"></textarea>
          </div>

          <div style="grid-column: 1 / -1; display: flex; gap: 12px; margin-top: 16px;">
            <button class="btn btn-primary" (click)="saveProfile()" style="flex: 1;">Guardar Cambios</button>
            <button class="btn btn-outline" (click)="cancelEdit()" style="flex: 1;">Cancelar</button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
